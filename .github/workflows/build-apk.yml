name: 自动打包NCM2FLAC APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 配置JDK 17（GitHub官方原生action，符合项目要求）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置Gradle执行权限
        run: |
          chmod +x ./gradlew
          echo "✅ Gradle执行权限配置完成"

      - name: 官方标准构建APK（使用项目原生Gradle流程，自动处理所有依赖）
        run: |
          # 自动接受Android SDK许可协议，无交互卡住问题
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          # 同时构建Debug和Release包，和本地Android Studio构建结果完全一致
          ./gradlew assembleDebug assembleRelease
          echo "✅ APK构建完成"

      - name: 上传Debug安装包
        uses: actions/upload-artifact@v4
        with:
          name: NCM2FLAC-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 上传Release安装包
        uses: actions/upload-artifact@v4
        with:
          name: NCM2FLAC-Release-APK
          path: app/build/outputs/apk/release/*.apk
