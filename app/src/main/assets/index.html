<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Music</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; }
        #fileInput { display: none; }
        #resultList { margin-top: 20px; }
        .result-item { padding: 10px; margin: 10px 0; background: #fff; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <input type="file" id="fileInput" multiple accept="audio/*,.ncm,.mgg,.mflac,.kgm,.kgma,.qmc0,.qmcflac,.qmcogg,.kwm,.tm0,.tm2,.tm3,.tm6,.bkcmp3,.bkcm4a,.mg3d">
        <div id="resultList"></div>
    </div>

    <script src="unlock-music.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const resultList = document.getElementById('resultList');

        fileInput.addEventListener('change', async function(e) {
            const files = e.target.files;
            if (!files.length) return;

            resultList.innerHTML = '';
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const item = document.createElement('div');
                item.className = 'result-item';
                item.textContent = '正在解密：' + file.name;
                resultList.appendChild(item);

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const data = new Uint8Array(arrayBuffer);
                    const decryptResult = await unlockMusic.decrypt(file.name, data);
                    
                    item.textContent = '解密成功：' + decryptResult.fileName;
                    const blob = new Blob([decryptResult.data], { type: 'audio/' + decryptResult.format });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = decryptResult.fileName;
                    a.textContent = ' 下载';
                    item.appendChild(a);
                } catch (err) {
                    item.textContent = '解密失败：' + file.name + ' - ' + err.message;
                }
            }
        });
    </script>
</body>
</html>
