name: Build and Fix NCM2FLAC Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      
      - name: Clean project
        run: ./gradlew clean

      # 步骤2：构建Debug APK，并禁用混淆，启用详细日志
      - name: Build Debug APK (with no minification)
        run: ./gradlew assembleDebug -Pandroid.debug.obsoleteApi=true --stacktrace --info
        env:
          # 关键：强制关闭Debug版本的代码混淆
          ANDROID_DEBUG_MINIFY_ENABLED: false

      # 步骤3：验证APK中是否包含MainActivity类（可选，但能提前发现问题）
      - name: Verify APK contents
        run: |
          unzip -q -o app/build/outputs/apk/debug/app-debug.apk -d apk_contents
          if ! grep -q "com/example/ncm2flac/MainActivity" apk_contents/classes.dex; then
            echo "ERROR: MainActivity.class not found in APK!"
            exit 1
          else
            echo "SUCCESS: MainActivity.class found in APK."
          fi

      # 步骤4：上传修复后的APK
      - name: Upload fixed Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: NCM2FLAC-Converter-Fixed-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
