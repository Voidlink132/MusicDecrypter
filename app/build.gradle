plugins {
    id 'com.android.application'
}

android {
    // 【核心修复】AGP 8.0+强制要求，完全匹配你原有源码的包名，无任何改动
    namespace "com.ncmconverter.app"
    // 修复版本兼容，AGP 8.2.0最高支持compileSdk 34，和你原有的targetSdk 35兼容
    compileSdk 34

    defaultConfig {
        // 完全匹配你原有包名，无任何改动
        applicationId "com.ncmconverter.app"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        // 匹配你原有的Java 1.7编译要求，向下兼容
        sourceCompatibility JavaVersion.VERSION_1_7
        targetCompatibility JavaVersion.VERSION_1_7
    }
}

dependencies {
    // 仅保留Android基础兼容依赖，无多余添加
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
